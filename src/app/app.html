<div class="app-container">
  <app-navbar [units]="units()"></app-navbar>

  <header>
    <h1>How's the sky looking today?</h1>
  </header>

  <section class="search-section">
    <input type="text" placeholder="Search for a city, e.g., New York">
    <button>Search</button>
  </section>

  <section class="content-container">
    <div class="left-container">
      <div class="weather-info-container">
        <div class="hero-section">
          <div class="hero-info">
            <h3>Berlin, Germany</h3>
            <h4 class="label">Tuesday, Aug 5, 2025</h4>
          </div>
          <div class="temperature-container">
            <img src="assets/images/icon-sunny.webp"/>
            <h2>20º</h2>
          </div>
        </div>

        <div class="weather-details-container">
          <div class="weather-container-item">
            <p class="label">Feels like</p>
            <p class="value">18º</p>
          </div>
          <div class="weather-container-item">
            <p class="label">Humclassity</p>
            <p class="value">46%</p>
          </div>
          <div class="weather-container-item">
            <p class="label">Wind</p>
            <p class="value">14 km/h</p>
          </div>
          <div class="weather-container-item">
            <p class="label">Precipitation</p>
            <p class="value">0 mm</p>
          </div>
        </div>

        <div class="daily-forecast-container">
          <p class="text-preset-5">Daily forecast</p>

          <div class="daily-forecast">
            <div class="daily-forecast-item">
              <p class="label center">Tue</p>
              <img src="assets/images/icon-rain.webp"/>
              <div class="temperature-range">
                <p class="value">24º</p>
                <p class="value">14º</p>
              </div>
            </div>
            <div class="daily-forecast-item">
              <p class="label center">Wed</p>
              <img src="assets/images/icon-drizzle.webp"/>
              <div class="temperature-range">
                <p class="value">21º</p>
                <p class="value">15º</p>
              </div>
            </div>
            <div class="daily-forecast-item">
              <p class="label center">Thu</p>
              <img src="assets/images/icon-sunny.webp"/>
              <div class="temperature-range">
                <p class="value">24º</p>
                <p class="value">14º</p>
              </div>
            </div>
            <div class="daily-forecast-item">
              <p class="label center">Fri</p>
              <img src="assets/images/icon-partly-cloudy.webp"/>
              <div class="temperature-range">
                <p class="value">25º</p>
                <p class="value">13º</p>
              </div>
            </div>
            <div class="daily-forecast-item">
              <p class="label center">Sat</p>
              <img src="assets/images/icon-storm.webp"/>
              <div class="temperature-range">
                <p class="value">21º</p>
                <p class="value">15º</p>
              </div>
            </div>
            <div class="daily-forecast-item">
              <p class="label center">Sun</p>
              <img src="assets/images/icon-snow.webp"/>
              <div class="temperature-range">
                <p class="value">25º</p>
                <p class="value">16º</p>
              </div>
            </div>
            <div class="daily-forecast-item">
              <p class="label center">Mon</p>
              <img src="assets/images/icon-fog.webp"/>
              <div class="temperature-range">
                <p class="value">24º</p>
                <p class="value">15º</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="right-container">
      <div class="hourly-forecast-container">
        <div>
          <p>Hourly forecast</p>
          <button>Tuesday</button>
        </div>
      </div>
    </div>
  </section>

  <app-footer></app-footer>
</div>
